stages:
  - build
  - deploy
  - verify

# ── Build: buat Docker image di dalam Minikube ──────────────────────────────
build_image:
  stage: build
  tags:
    - runner-drpl
  script:
    - export PATH=$PATH:/opt/homebrew/bin
    - echo "[1/3] Membangun Docker image di Minikube..."
    - minikube image build -t web-portofolio:latest .
    - echo "✓ Image web-portofolio:latest berhasil dibuat."

# ── Deploy: terapkan ke Kubernetes via Minikube ──────────────────────────────
deploy_ke_minikube:
  stage: deploy
  tags:
    - runner-drpl
  script:
    - export PATH=$PATH:/opt/homebrew/bin
    - echo "[2/3] Menerapkan Deployment ke Kubernetes..."
    - kubectl get deployment deploy-portofolio || kubectl create deployment deploy-portofolio --image=web-portofolio:latest
    - kubectl set image deployment/deploy-portofolio web-portofolio=web-portofolio:latest || true
    # Rolling restart yang halus: pod baru dibuat & siap dulu, baru pod lama dimatikan (zero-downtime)
    - kubectl patch deployment deploy-portofolio -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"redeployedAt\":\"$(date +%s)\"}}}}}"
    - kubectl rollout status deployment/deploy-portofolio --timeout=90s
    - kubectl get service deploy-portofolio || kubectl expose deployment deploy-portofolio --type=NodePort --port=80
    - echo "✓ Service tersedia."

# ── Verify: cek pod dan URL akses ────────────────────────────────────────────
verify_deployment:
  stage: verify
  tags:
    - runner-drpl
  script:
    - export PATH=$PATH:/opt/homebrew/bin
    - echo "[3/3] Memverifikasi status deployment..."
    - kubectl rollout status deployment/deploy-portofolio --timeout=60s
    - echo "── Status Pod ──"
    - kubectl get pods -l app=deploy-portofolio
    - echo "── Status Service ──"
    - kubectl get service deploy-portofolio
    - echo "✓ Deploy Otomatis Berhasil! Pipeline selesai."
